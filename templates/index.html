<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Compiler Diagnostic Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-8">
    <div class="w-full max-w-3xl">
        <h1 class="text-4xl font-bold text-center mb-2 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
            Compiler Diagnostic AI
        </h1>
        <p class="text-center text-slate-400 mb-10">NIT Warangal Mid-Lab Evaluation • Week 8</p>

        <div class="glass p-6 rounded-2xl mb-6">
            <textarea id="errorInput" class="w-full h-32 bg-slate-900 border border-slate-700 rounded-lg p-4 text-emerald-400 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Paste C error here..."></textarea>
            <button id="btn" class="w-full mt-4 bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold transition-all">Analyze Error</button>
        </div>

        <div id="result" class="hidden glass p-6 rounded-2xl border-l-4 border-blue-500">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-xs text-slate-500 uppercase">Classification</p>
                    <h2 id="cat" class="text-2xl font-bold">SYNTACTIC</h2>
                </div>
                <div class="text-right">
                    <p class="text-xs text-slate-500 uppercase">AI Confidence</p>
                    <h2 id="conf" class="text-2xl font-bold text-blue-400">99.95%</h2>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('btn').onclick = async () => {
            const btn = document.getElementById('btn');
            const msg = document.getElementById('errorInput').value;
            if(!msg) return;
            
            btn.innerText = "Analyzing...";
            const res = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `error_message=${encodeURIComponent(msg)}`
            });
            const data = await res.json();
            
            document.getElementById('cat').innerText = data.category;
            document.getElementById('conf').innerText = data.confidence;
            document.getElementById('result').classList.remove('hidden');
            btn.innerText = "Analyze Error";
        };
    </script>
</body>
</html>
